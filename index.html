<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PageBreak — Digital Reading Made Easy</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="nav-wrap">
          <nav class="nav-menu" aria-label="Main">
            <button type="button" class="menu-toggle" aria-expanded="false" aria-haspopup="true" aria-controls="site-menu">
              <span class="menu-icon" aria-hidden="true"></span>
              Menu
            </button>
            <ul id="site-menu" class="dropdown" role="menu">
              <li role="none"><a href="index.html" role="menuitem" aria-current="page">Search Books</a></li>
              <li role="none"><a href="about.html" role="menuitem">About Us</a></li>
              <li role="none"><a href="reading-list.html" role="menuitem">Load Reading List</a></li>
              <li role="none"><a href="contact.html" role="menuitem">Contact</a></li>
            </ul>
          </nav>
        </div>
        <div class="brand">
          <h1 class="brand-title">
            PageBreak
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img" focusable="false">
                <path
                  d="M12 5.25c-1.9-1.45-3.95-2.05-6.75-2.05A2.25 2.25 0 0 0 3 5.45v11.9a1 1 0 0 0 1.15.98c2.6-.38 4.69.15 6.85 1.52m1-14.6c1.9-1.45 3.95-2.05 6.75-2.05A2.25 2.25 0 0 1 21 5.45v11.9a1 1 0 0 1-1.15.98c-2.6-.38-4.69.15-6.85 1.52m-1-14.6v14.6"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                ></path>
              </svg>
            </span>
          </h1>
          <p class="brand-tagline">Digital Reading Made Easy</p>
        </div>
      </header>

      <main class="main-search">
        <div class="drm-filter" aria-label="DRM3 filter">
          <p class="drm-filter__label">DRM3 only?</p>
          <div class="drm-toggle drm-toggle--yes" role="switch" aria-checked="true" aria-disabled="true">
            <span class="drm-toggle__option drm-toggle__option--no">No</span>
            <span class="drm-toggle__option drm-toggle__option--yes">Yes</span>
            <span class="drm-toggle__thumb" aria-hidden="true">Q</span>
          </div>
        </div>
        <form class="search-form" action="#" method="get" role="search" aria-label="Search books">
          <input
            type="search"
            name="q"
            id="book-search"
            placeholder="Book title or author…"
            autocomplete="off"
            aria-label="Book title or author"
          />
          <button type="submit">Search</button>
        </form>
        <section id="search-results" aria-live="polite"></section>
      </main>
    </div>
    <script src="nav.js"></script>
    <script src="search.js"></script>
  </body>
</html>
